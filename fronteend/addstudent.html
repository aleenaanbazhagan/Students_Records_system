<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f4f6f9;
        }

        /* Navbar */
        nav {
            background: #2c3e50;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 25px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
        }

        nav ul li a:hover {
            color: #1abc9c;
        }

        /* Form */
        .form-container {
            width: 500px;
            background: white;
            margin: 40px auto;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        textarea {
            resize: none;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn:hover {
            background: #1abc9c;
        }
    </style>

</head>
<body>

    <nav>
        <div>🎓 Student System</div>
        <ul>
            <li><a href="./homepage.html">Home</a></li>
            <li><a href="./addstudent.html">Add Student</a></li>
            <li><a href="./viewstudent.html">View Students</a></li>
            <li><a href="#" onclick="logout()">Logout</a></li>
        </ul>
    </nav>

    <div class="form-container">
        <h2>Add Student Record</h2>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name">
        </div>

        <div class="form-group">
            <label>Roll Number</label>
            <input type="text" id="roll">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email">
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text" id="phone">
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select id="gender">
                <option value="">Select</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" id="dob">
        </div>

        <div class="form-group">
            <label>Department</label>
            <input type="text" id="department">
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea id="address" rows="3"></textarea>
        </div>

        <button class="btn" onclick="addStudent()">Add Student</button>
    </div>

    <script>
        function logout() {
            window.location.href = "./homepage.html";
        }

        function addStudent() {

            const student = {
                name: document.getElementById("name").value.trim(),
                roll: document.getElementById("roll").value.trim(),
                email: document.getElementById("email").value.trim(),
                phone: document.getElementById("phone").value.trim(),
                gender: document.getElementById("gender").value,
                dob: document.getElementById("dob").value,
                department: document.getElementById("department").value.trim(),
                address: document.getElementById("address").value.trim()
            };

            // Validation
            if (!student.name || !student.roll || !student.email) {
                alert("Name, Roll and Email are required!");
                return;
            }

            let students = JSON.parse(localStorage.getItem("students")) || [];
            students.push(student);
            localStorage.setItem("students", JSON.stringify(students));

            window.location.href = "./viewstudent.html";
        }
    </script>

</body>
</html>
