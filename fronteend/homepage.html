<!DOCTYPE html>
<html>
<head>
    <title>Home - Student System</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #f4f6f9;
        }

        /* Navbar */
        nav {
            background-color: #2c3e50;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 25px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 15px;
            transition: 0.3s;
        }

        nav ul li a:hover {
            color: #1abc9c;
        }

        /* Content */
        .content {
            padding: 60px;
            text-align: center;
        }

        .content h1 {
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .content p {
            font-size: 18px;
            color: #555;
        }

        /* Button Style (Optional) */
        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #2c3e50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: #1abc9c;
        }
    </style>

</head>

<body>

    <nav>
        <div class="logo">🎓 Student System</div>
        <ul>
            <li><a href="./homepage.html">Home</a></li>
            <li><a href="./addstudent.html">Add Student</a></li>
            <li><a href="./viewstudent.html">View Students</a></li>
            <li><a href="#" onclick="logout()">Logout</a></li>
        </ul>
    </nav>

    <div class="content">
        <h1>Welcome to Student Record System</h1>
        <p>You can add and manage student records easily.</p>
    </div>

    <script>
        // Logout function
        function logout() {
            window.location.href = "./addstudent.html";
        }

        // Navigate to Add Page
        function goToAdd() {
            window.location.href = "./addstudent.html";
        }
    </script>

</body>
</html>
